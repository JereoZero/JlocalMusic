name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'windows-2022'
            args: '--verbose'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install create-dmg

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Verify toolchain (Windows)
        if: matrix.platform == 'windows-2022'
        run: |
          rustc --version
          cargo --version
          rustup target list --installed
          node --version
          npm --version

      - name: Build frontend (Windows)
        if: matrix.platform == 'windows-2022'
        run: npm run build

      - name: Cargo build (Windows)
        if: matrix.platform == 'windows-2022'
        run: cargo build --release 2>&1 | Tee-Object -FilePath cargo-build.log
        working-directory: ./src-tauri
        continue-on-error: true

      - name: Upload cargo build log (Windows)
        if: always() && matrix.platform == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-build-log
          path: src-tauri/cargo-build.log

      - name: Tauri bundle (Windows)
        if: matrix.platform == 'windows-2022'
        run: npx tauri build --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Jlocal ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: jlocal-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: jlocal-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe